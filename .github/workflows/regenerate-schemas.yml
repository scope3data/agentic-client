name: Regenerate Schemas

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    name: Regenerate Schemas and Open PR
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SCOPE3_WIZARD_CLIENT_ID }}
          private-key: ${{ secrets.SCOPE3_WIZARD_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Regenerate schemas
        run: npm run generate-schemas

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/schemas/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for existing PR
        if: steps.changes.outputs.has_changes == 'true'
        id: existing-pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          EXISTING=$(gh pr list --search 'chore: regenerate schemas in:title' --state open --json number --jq 'length')
          echo "count=$EXISTING" >> $GITHUB_OUTPUT

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true' && steps.existing-pr.outputs.count == '0'
        id: create-pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="chore/regenerate-schemas-$(date +%Y%m%d-%H%M%S)"

          git config user.name "scope3-wizard[bot]"
          git config user.email "${{ vars.SCOPE3_WIZARD_APP_ID }}+scope3-wizard[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add src/schemas/
          git commit -m "chore: regenerate schemas from OpenAPI spec"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "chore: regenerate schemas from OpenAPI spec" \
            --body "Auto-generated PR to update Zod schemas from the latest OpenAPI specification.

          This PR was triggered by the drift detection workflow.

          ## Changes
          - Regenerated \`src/schemas/buyer.ts\` from OpenAPI spec

          ## Review
          Please review the schema changes before merging." \
            --base main \
            --head "$BRANCH")

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Notify Slack
        if: steps.create-pr.outputs.pr_url
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_NOTIF_BOT_TOKEN }}
        run: |
          TIMESTAMP=$(date +%s)
          TIMESTAMP_FMT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          PAYLOAD=$(jq -n \
            --arg channel "#agentic-service-alerts" \
            --arg header "SDK Schemas Regenerated" \
            --arg repo "${{ github.repository }}" \
            --arg server "${{ github.server_url }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg pr_url "${{ steps.create-pr.outputs.pr_url }}" \
            --argjson ts "$TIMESTAMP" \
            --arg ts_fmt "$TIMESTAMP_FMT" \
            '{
              channel: $channel,
              text: $header,
              blocks: [
                {type: "header", text: {type: "plain_text", text: $header}},
                {type: "context", elements: [{type: "mrkdwn", text: "<\($server)/\($repo)|\($repo)> | <\($server)/\($repo)/actions/runs/\($run_id)|Run #\($run_id)>"}]},
                {type: "section", text: {type: "mrkdwn", text: "A PR has been created to update Zod schemas from the latest OpenAPI specification."}},
                {type: "section", text: {type: "mrkdwn", text: "<\($pr_url)|View Pull Request>"}},
                {type: "context", elements: [{type: "mrkdwn", text: "Posted at <!date^\($ts)^{date_num} {time_secs}|\($ts_fmt)>"}]}
              ]
            }')
          RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          if [ "$(echo "$RESPONSE" | jq -r '.ok')" != "true" ]; then
            echo "Slack API error: $(echo "$RESPONSE" | jq -r '.error')"
            exit 1
          fi
