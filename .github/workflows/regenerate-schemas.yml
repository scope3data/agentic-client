name: Regenerate Schemas

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    name: Regenerate Schemas and Open PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SCOPE3_WIZARD_CLIENT_ID }}
          private-key: ${{ secrets.SCOPE3_WIZARD_APP_PRIVATE_KEY }}

      - name: Configure git for app token
        run: git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}"

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Regenerate schemas
        run: npm run generate-schemas

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/schemas/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for existing PR
        if: steps.changes.outputs.has_changes == 'true'
        id: existing-pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          EXISTING=$(gh pr list --search 'chore: regenerate schemas in:title' --state open --json number --jq 'length')
          echo "count=$EXISTING" >> $GITHUB_OUTPUT

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true' && steps.existing-pr.outputs.count == '0'
        id: create-pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH="chore/regenerate-schemas-${TIMESTAMP}"
          CHANGESET_FILE=".changeset/regenerate-schemas-${TIMESTAMP}.md"

          git config user.name "scope3-wizard[bot]"
          git config user.email "${{ vars.SCOPE3_WIZARD_APP_ID }}+scope3-wizard[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          cat > "$CHANGESET_FILE" <<'EOF'
          ---
          'scope3': minor
          ---

          Regenerate Zod schemas from the latest OpenAPI specification
          EOF

          git add src/schemas/ "$CHANGESET_FILE"
          git commit -m "chore: regenerate schemas from OpenAPI spec"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "chore: regenerate schemas from OpenAPI spec" \
            --body "Auto-generated PR to update Zod schemas from the latest OpenAPI specification.

          This PR was triggered by the drift detection workflow.

          ## Changes
          - Regenerated \`src/schemas/buyer.ts\` from OpenAPI spec

          ## Review
          Please review the schema changes before merging." \
            --base main \
            --head "$BRANCH")

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Notify Slack
        if: steps.create-pr.outputs.pr_url
        uses: ./.github/actions/slack-post
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_NOTIF_BOT_TOKEN }}
        with:
          channel: '#agentic-service-alerts'
          header: 'SDK Schemas Regenerated'
          content: |
            [
              {"type": "section", "text": {"type": "mrkdwn", "text": "A PR has been created to update Zod schemas from the latest OpenAPI specification."}},
              {"type": "section", "text": {"type": "mrkdwn", "text": "<${{ steps.create-pr.outputs.pr_url }}|View Pull Request>"}}
            ]

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/slack-post
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_NOTIF_BOT_TOKEN }}
        with:
          channel: '#agentic-service-alerts'
          header: 'Schema Regeneration Failed'
          content: '[{"type": "section", "text": {"type": "mrkdwn", "text": "The schema regeneration workflow failed. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"}}]'
