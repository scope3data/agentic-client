name: API Drift Detection

on:
  schedule:
    - cron: '0 8 * * 1-5' # 8am UTC, weekdays
  workflow_dispatch:

jobs:
  detect-drift:
    name: Check for API Drift
    runs-on: ubuntu-latest
    outputs:
      drift_detected: ${{ steps.drift.outputs.exit_code == '1' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Run drift detection
        id: drift
        run: |
          set +e
          OUTPUT=$(npm run --silent detect-drift -- --json 2>/tmp/drift-stderr.log)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "$OUTPUT" > drift-report.json
          cat drift-report.json
          if [ -s /tmp/drift-stderr.log ]; then
            echo "--- stderr ---"
            cat /tmp/drift-stderr.log
          fi
          exit 0

      - name: Parse drift report
        if: steps.drift.outputs.exit_code == '1'
        id: parse
        run: |
          REPORT=$(cat drift-report.json)
          TOTAL=$(echo "$REPORT" | jq -r '.totalDrift')
          SKILL_MISSING=$(echo "$REPORT" | jq -r '.drift.inSpecNotSkill | length')
          SKILL_EXTRA=$(echo "$REPORT" | jq -r '.drift.inSkillNotSpec | length')
          SDK_MISSING=$(echo "$REPORT" | jq -r '.drift.inSpecNotSdk | length')
          SDK_EXTRA=$(echo "$REPORT" | jq -r '.drift.inSdkNotSpec | length')
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "skill_missing=$SKILL_MISSING" >> $GITHUB_OUTPUT
          echo "skill_extra=$SKILL_EXTRA" >> $GITHUB_OUTPUT
          echo "sdk_missing=$SDK_MISSING" >> $GITHUB_OUTPUT
          echo "sdk_extra=$SDK_EXTRA" >> $GITHUB_OUTPUT

      - name: Alert on drift
        if: steps.drift.outputs.exit_code == '1'
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_NOTIF_BOT_TOKEN }}
        run: |
          TIMESTAMP=$(date +%s)
          TIMESTAMP_FMT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          PAYLOAD=$(jq -n \
            --arg channel "#agentic-service-alerts" \
            --arg header "SDK API Drift Detected" \
            --arg repo "${{ github.repository }}" \
            --arg server "${{ github.server_url }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg total "${{ steps.parse.outputs.total }}" \
            --arg skill_missing "${{ steps.parse.outputs.skill_missing }}" \
            --arg skill_extra "${{ steps.parse.outputs.skill_extra }}" \
            --arg sdk_missing "${{ steps.parse.outputs.sdk_missing }}" \
            --arg sdk_extra "${{ steps.parse.outputs.sdk_extra }}" \
            --argjson ts "$TIMESTAMP" \
            --arg ts_fmt "$TIMESTAMP_FMT" \
            '{
              channel: $channel,
              text: $header,
              blocks: [
                {type: "header", text: {type: "plain_text", text: $header}},
                {type: "context", elements: [{type: "mrkdwn", text: "<\($server)/\($repo)|\($repo)> | <\($server)/\($repo)/actions/runs/\($run_id)|Run #\($run_id)>"}]},
                {type: "section", text: {type: "mrkdwn", text: ("*\($total) endpoint(s) out of sync*\n\n*skill.md vs spec:*\n• Missing from skill.md: \($skill_missing)\n• Extra in skill.md: \($skill_extra)\n\n*SDK vs spec:*\n• Missing from SDK: \($sdk_missing)\n• Extra in SDK: \($sdk_extra)")}},
                {type: "section", text: {type: "mrkdwn", text: "<\($server)/\($repo)/actions/runs/\($run_id)|View full report>"}},
                {type: "context", elements: [{type: "mrkdwn", text: "Posted at <!date^\($ts)^{date_num} {time_secs}|\($ts_fmt)>"}]}
              ]
            }')
          RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          if [ "$(echo "$RESPONSE" | jq -r '.ok')" != "true" ]; then
            echo "Slack API error: $(echo "$RESPONSE" | jq -r '.error')"
            exit 1
          fi

  regenerate:
    name: Regenerate Schemas
    needs: detect-drift
    if: needs.detect-drift.outputs.drift_detected == 'true'
    uses: ./.github/workflows/regenerate-schemas.yml
    secrets: inherit
